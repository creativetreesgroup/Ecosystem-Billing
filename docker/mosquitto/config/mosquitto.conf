listener 1883
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# §9/§11: anonymous WAJIB off, kredensial + ACL per device — tanpa
# passwordfile, container ini sengaja GAGAL start (fail secure, §3.5).
# Generate sekali di awal (tugas manusia, §14 — lihat RUNBOOK.md):
#   docker compose -f docker-compose.devices.yml run --rm mosquitto \
#     mosquitto_passwd -c /mosquitto/config/passwordfile ctb-app
#   docker compose -f docker-compose.devices.yml run --rm mosquitto \
#     mosquitto_passwd /mosquitto/config/passwordfile plug-ps01
# (satu baris tambahan per plug baru, cocokkan username dengan acl.conf)
allow_anonymous false
password_file /mosquitto/config/passwordfile
acl_file /mosquitto/config/acl.conf
