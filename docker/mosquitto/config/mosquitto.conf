listener 1883
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

# Dev default: anonymous diizinkan supaya bridge:mqtt-listen & TasmotaDriver
# bisa langsung konek tanpa setup tambahan. WAJIB diganti sebelum production
# (lihat RUNBOOK.md — tugas manusia §14): matikan baris ini, aktifkan dua
# baris di bawah, lalu isi MQTT_USERNAME/MQTT_PASSWORD di .env.
allow_anonymous true

# allow_anonymous false
# password_file /mosquitto/config/passwordfile
