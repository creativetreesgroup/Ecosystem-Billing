# Satu blok per plug fisik (tugas manusia saat provisioning, §14) — tiap
# device dapat username sendiri, dibatasi hanya ke topic miliknya. Ganti
# plug-ps01 dengan control_ref sebenarnya (lihat kolom Unit::control_ref).
#
# user plug-ps01
# topic readwrite cmnd/plug-ps01/POWER
# topic write stat/plug-ps01/POWER
# topic write tele/plug-ps01/LWT

# Aplikasi (bridge:mqtt-listen daemon + TasmotaDriver) tersentralisasi jadi
# satu koneksi untuk SEMUA plug — beri user terpisah dengan akses ke semua
# topic device, bukan shared credential dengan plug manapun. Username ini
# harus sama dengan MQTT_USERNAME di .env.
user ctb-app
topic write cmnd/+/POWER
topic read stat/+/POWER
topic read tele/+/LWT
