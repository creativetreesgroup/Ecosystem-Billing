# Instal ke /etc/supervisor/conf.d/, lalu `supervisorctl reread && supervisorctl update`.
# numprocs=2 (bukan 8 seperti contoh dokumentasi Laravel) — job di sistem ini
# (expiry, warning, reconciliation power-off) ringan & jarang untuk skala satu
# outlet, dua worker sudah jauh dari batas.
[program:ctb-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/creative-trees-billing/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/var/www/creative-trees-billing
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/www/creative-trees-billing/storage/logs/queue-worker.log
stopwaitsecs=3600
