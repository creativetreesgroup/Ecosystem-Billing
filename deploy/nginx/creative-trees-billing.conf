# Panel hanya di LAN (§11) — tanpa port forwarding, tanpa SSL (akses remote
# owner lewat Tailscale, didokumentasikan di RUNBOOK.md, bukan lewat port
# publik). Reverb TIDAK di-proxy lewat vhost ini: browser konek langsung ke
# port REVERB_PORT (lihat .env), sesuai konfigurasi VITE_REVERB_* sejak Fase 1
# — menambah reverse proxy WebSocket di sini untuk skenario LAN tunggal ini
# cuma menambah lapisan tanpa manfaat.
#
# Ganti server_name ke hostname/IP LAN mini PC, dan verifikasi path socket
# PHP-FPM cocok dengan instalasi sebenarnya (`ls /run/php/`).
server {
    listen 80;
    listen [::]:80;
    server_name creative-trees-billing.local;
    root /var/www/creative-trees-billing/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ ^/index\.php(/|$) {
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
